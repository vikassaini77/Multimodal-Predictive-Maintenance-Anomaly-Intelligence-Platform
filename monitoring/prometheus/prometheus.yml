global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']
  
  - job_name: 'edge'
    # Wait, the edge service is currently not exposing prometheus metrics natively in python. 
    # But it is part of the architecture. Since it's a gRPC service, we'll keep it simple for now or scrape via HTTP if it exposed metrics.
    # For now, let's assume we can scrape the fastapi one. We'll leave the job for edge just in case.
    static_configs:
      - targets: ['edge:8080']
