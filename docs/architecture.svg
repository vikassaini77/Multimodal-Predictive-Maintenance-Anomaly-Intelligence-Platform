<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2px; rx: 8px; }
      .text { font-family: Arial, sans-serif; font-size: 16px; fill: #212529; text-anchor: middle; font-weight: bold; }
      .line { stroke: #495057; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
      .subtext { font-family: Arial, sans-serif; font-size: 12px; fill: #6c757d; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  
  <text x="400" y="40" class="text" font-size="24">Multimodal Predictive Maintenance Architecture</text>

  <!-- Frontend -->
  <rect x="300" y="80" width="200" height="60" class="box"/>
  <text x="400" y="110" class="text">React Frontend</text>
  <text x="400" y="125" class="subtext">Vite + TailwindCSS</text>

  <!-- FastAPI Backend -->
  <rect x="300" y="200" width="200" height="60" class="box"/>
  <text x="400" y="230" class="text">FastAPI Backend</text>
  <text x="400" y="245" class="subtext">REST + WebSockets</text>

  <!-- Edge Service -->
  <rect x="300" y="320" width="200" height="60" class="box"/>
  <text x="400" y="350" class="text">gRPC Edge Service</text>
  <text x="400" y="365" class="subtext">TensorRT + ONNX</text>

  <!-- Agent -->
  <rect x="580" y="200" width="160" height="60" class="box"/>
  <text x="660" y="230" class="text">ReAct Agent</text>
  <text x="660" y="245" class="subtext">Gemini 2.5 Flash</text>

  <!-- Data Sources -->
  <rect x="60" y="320" width="160" height="60" class="box"/>
  <text x="140" y="350" class="text">IoT Sensors &amp; Cameras</text>
  <text x="140" y="365" class="subtext">Vibration + Frames</text>

  <!-- Databases -->
  <rect x="300" y="440" width="200" height="60" class="box"/>
  <text x="400" y="470" class="text">Databases</text>
  <text x="400" y="485" class="subtext">Postgres + Redis + Qdrant</text>

  <!-- Arrows -->
  <path d="M 400 140 L 400 200" class="line"/>
  <path d="M 400 260 L 400 320" class="line"/>
  <path d="M 500 230 L 580 230" class="line"/>
  <path d="M 220 350 L 300 350" class="line"/>
  <path d="M 400 380 L 400 440" class="line"/>
</svg>
